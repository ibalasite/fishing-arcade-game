apiVersion: apps/v1
kind: Deployment
metadata:
  name: fishing-cocos
  namespace: fishing-game
  labels:
    app: fishing-cocos
    component: client
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fishing-cocos
  template:
    metadata:
      labels:
        app: fishing-cocos
        component: client
    spec:
      containers:
        - name: cocos
          image: fishing-cocos:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          readinessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /index.html
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: fishing-cocos
  namespace: fishing-game
  labels:
    app: fishing-cocos
    component: client
spec:
  selector:
    app: fishing-cocos
  type: NodePort
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30090
