apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: fishing-game-server-netpol
  namespace: fishing-game
  labels:
    app: fishing-game-server
spec:
  podSelector:
    matchLabels:
      app: fishing-game-server
  policyTypes:
    - Ingress
    - Egress

  ingress:
    # Allow inbound traffic only from the nginx-ingress namespace (load balancer pods)
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3000

  egress:
    # Allow outbound to PostgreSQL
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432

    # Allow outbound to Redis (in-cluster development instance)
    - to:
        - namespaceSelector: {}
          podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379

    # Allow DNS resolution via kube-dns
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
