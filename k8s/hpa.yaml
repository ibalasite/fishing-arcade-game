apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fishing-game-server-hpa
  namespace: fishing-game
  labels:
    app: fishing-game-server
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fishing-game-server
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
    scaleDown:
      # Conservative scale-down to avoid dropping active game rooms
      stabilizationWindowSeconds: 300
      policies:
        - type: Pods
          value: 1
          periodSeconds: 300
