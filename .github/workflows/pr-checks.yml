name: PR Quality Gates

on:
  pull_request:
    branches: [main]

jobs:
  check-pr-title:
    name: Conventional Commit Title
    runs-on: ubuntu-latest
    steps:
      - name: Check PR title format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "PR title: $PR_TITLE"
          if echo "$PR_TITLE" | grep -qE "^(feat|fix|refactor|docs|test|chore|perf|ci|build|revert)(\(.+\))?\!?:"; then
            echo "PR title follows conventional commits format."
          else
            echo "ERROR: PR title does not follow conventional commits format."
            echo "Expected format: <type>(<scope>): <description>"
            echo "Allowed types: feat, fix, refactor, docs, test, chore, perf, ci, build, revert"
            echo "Example: feat(game): add jackpot bonus round"
            exit 1
          fi

  coverage-gate:
    name: Coverage Regression Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run coverage on PR branch
        run: |
          npx jest --coverage --coverageReporters=json-summary 2>/dev/null || true
          if [ -f coverage/coverage-summary.json ]; then
            PR_LINES=$(node -e "
              const s = require('./coverage/coverage-summary.json');
              console.log(s.total.lines.pct);
            ")
            echo "PR branch line coverage: $PR_LINES%"
            echo "PR_COVERAGE=$PR_LINES" >> $GITHUB_ENV
          else
            echo "Coverage summary not found."
            echo "PR_COVERAGE=unknown" >> $GITHUB_ENV
          fi

      - name: Checkout base branch coverage
        run: |
          git stash || true
          git checkout ${{ github.event.pull_request.base.sha }} -- . 2>/dev/null || true
          npm ci 2>/dev/null || true
          npx jest --coverage --coverageReporters=json-summary 2>/dev/null || true
          if [ -f coverage/coverage-summary.json ]; then
            BASE_LINES=$(node -e "
              const s = require('./coverage/coverage-summary.json');
              console.log(s.total.lines.pct);
            ")
            echo "Base branch line coverage: $BASE_LINES%"
            echo "BASE_COVERAGE=$BASE_LINES" >> $GITHUB_ENV
          else
            echo "Base coverage not found — skipping regression check."
            echo "BASE_COVERAGE=unknown" >> $GITHUB_ENV
          fi

      - name: Compare coverage
        run: |
          if [ "$PR_COVERAGE" = "unknown" ] || [ "$BASE_COVERAGE" = "unknown" ]; then
            echo "Coverage data unavailable — skipping regression check."
            exit 0
          fi
          node -e "
            const pr = parseFloat(process.env.PR_COVERAGE);
            const base = parseFloat(process.env.BASE_COVERAGE);
            console.log('Base coverage:   ' + base + '%');
            console.log('PR coverage:     ' + pr + '%');
            console.log('Delta:           ' + (pr - base).toFixed(2) + '%');
            if (pr < base - 2) {
              console.error('ERROR: Coverage decreased by more than 2% (' + (base - pr).toFixed(2) + '%)');
              process.exit(1);
            }
            console.log('Coverage OK — no significant regression detected.');
          "

      - name: Post coverage comment on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const pr = process.env.PR_COVERAGE || 'N/A';
            const base = process.env.BASE_COVERAGE || 'N/A';
            let delta = 'N/A';
            let icon = 'ℹ️';
            if (pr !== 'N/A' && base !== 'N/A') {
              const d = (parseFloat(pr) - parseFloat(base)).toFixed(2);
              delta = (d >= 0 ? '+' : '') + d + '%';
              icon = parseFloat(d) >= 0 ? '✅' : (parseFloat(d) < -2 ? '❌' : '⚠️');
            }
            const body = `## ${icon} Coverage Report

            | Metric | Base | PR | Delta |
            |--------|------|----|-------|
            | Line coverage | ${base}% | ${pr}% | ${delta} |

            > Threshold: 80% minimum. Regression limit: −2%.
            `;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });
