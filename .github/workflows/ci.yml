name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests with coverage
        run: npx jest --coverage --coverageReporters=lcov,text-summary

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        continue-on-error: true
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false

      - name: Enforce minimum coverage threshold
        run: |
          COVERAGE=$(npx jest --coverage --coverageReporters=json-summary 2>/dev/null | true)
          SUMMARY_FILE="coverage/coverage-summary.json"
          if [ -f "$SUMMARY_FILE" ]; then
            LINES=$(node -e "
              const s = require('./$SUMMARY_FILE');
              const pct = s.total.lines.pct;
              console.log(pct);
            ")
            echo "Line coverage: $LINES%"
            if node -e "process.exit(parseFloat('$LINES') < 80 ? 1 : 0)"; then
              echo "Coverage OK"
            else
              echo "ERROR: Coverage $LINES% is below the 80% threshold"
              exit 1
            fi
          else
            echo "Coverage summary not found — skipping threshold check"
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies (HIGH+CRITICAL)
        run: npm audit --audit-level=high

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for hardcoded secrets..."
          # Allow env var references (process.env.SECRET) but flag bare assignments
          MATCHES=$(grep -rn "SECRET\|PASSWORD\|API_KEY\|TOKEN" src/ --include="*.ts" \
            | grep -v "process\.env\." \
            | grep -v "//.*SECRET\|//.*PASSWORD\|//.*API_KEY\|//.*TOKEN" \
            | grep -v "CODECOV_TOKEN\|GITHUB_TOKEN" \
            | grep -v "secrets\." \
            | grep -v "\.env\." \
            | grep -v "envSecret\|envPassword\|envToken\|envApiKey" \
            | grep -v "interface\|type\s\|string\|Record" \
            | grep -v "getSecret\|loadSecret\|requireSecret\|validateSecret" \
            || true)
          if [ -n "$MATCHES" ]; then
            echo "Potential hardcoded secrets found:"
            echo "$MATCHES"
            exit 1
          fi
          echo "No hardcoded secrets detected."

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint src/ --ext .ts
        continue-on-error: true

  docker-build:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: [test, security-scan]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        run: |
          docker build -f k8s/Dockerfile \
            -t fishing-game-server:${{ github.sha }} \
            .

      - name: Docker smoke test
        run: |
          docker run --rm fishing-game-server:${{ github.sha }} \
            node -e "require('./dist/index.js')" || true
