name: CD

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    environment: production
    outputs:
      git_sha: ${{ steps.vars.outputs.git_sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set GIT_SHA
        id: vars
        run: |
          GIT_SHA=$(git rev-parse --short HEAD)
          echo "GIT_SHA=$GIT_SHA" >> $GITHUB_ENV
          echo "git_sha=$GIT_SHA" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: k8s/Dockerfile
          push: true
          tags: |
            ghcr.io/ibalasite/fishing-game-server:${{ env.GIT_SHA }}
            ghcr.io/ibalasite/fishing-game-server:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: build-and-push
    environment: production
    env:
      GIT_SHA: ${{ needs.build-and-push.outputs.git_sha }}
    steps:
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: "latest"

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update deployment image
        run: |
          kubectl set image deployment/fishing-game-server \
            server=ghcr.io/ibalasite/fishing-game-server:${{ env.GIT_SHA }} \
            -n fishing-game

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/fishing-game-server \
            -n fishing-game --timeout=300s

      - name: Verify pods
        run: |
          kubectl get pods -n fishing-game

      - name: Smoke test health endpoint
        run: |
          curl -f https://game.fishing-arcade.example.com/health || {
            echo "Health check failed — rolling back..."
            kubectl rollout undo deployment/fishing-game-server -n fishing-game
            exit 1
          }
